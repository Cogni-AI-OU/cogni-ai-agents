---
# See: <https://opencode.ai/docs>
# Note: Keep keys and envs in alphabetical order.
name: OpenCode
on:
  issue_comment:
    types:
      - created
      - edited
  issues:
    types:
      - edited
      - opened
  pull_request_review:
    types:
      - submitted
  pull_request_review_comment:
    types:
      - created
      - edited
  workflow_call:
    inputs:
      agent:
        description: Agent to use.
        required: false
        type: string
      issue_number:
        description: Issue or PR number for workflow_call triggers
        required: false
        type: number
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        options:
          - cogni-ai-architect
          - cogni-ai-devops
          - cogni-ai-elite
          - cogni-ai-keeper
          - cogni-ai-reviewer
          - cogni-ai-weaver
        required: false
        type: choice
      issue_number:
        description: Issue or PR number for manual workflow execution
        required: false
        type: number
      model:
        default: opencode/gpt-5-codex
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/gemini-3-pro
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3-coder
          - opencode/qwen3.6-plus-free
        required: false
        type: choice
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
env:
  # yamllint disable rule:line-length
  OPENCODE_PERMISSION: |-
    bash:
      '*': deny
      ansible*: allow
      ansible-galaxy*: allow
      ansible-playbook*: allow
      awk*: allow
      continue*: allow
      cp*: allow
      docker*: allow
      ex*: allow
      gh*: allow
      gh pr review*: deny
      git*: allow
      hexdump*: allow
      jq*: allow
      links*: allow
      mawk*: allow
      molecule*: allow
      pipx*: allow
      pre-commit*: allow
      printf*: allow
      sed*: allow
      set*: allow
      time*: allow
      timeout*: allow
      touch*: allow
      true*: allow
      vim*: allow
  # yamllint enable rule:line-length
jobs:
  opencode:
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
    uses: Cogni-AI-OU/.github/.github/workflows/opencode.yml@main
    with:
      agent: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.agent || '' }}
      issue_number: >-
        ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number || '' }}
      model: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.model || '' }}
      prompt: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.prompt || '' }}
