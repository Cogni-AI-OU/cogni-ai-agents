---
# See: <https://opencode.ai/docs>
# Note: Keep keys and envs in alphabetical order.
name: OpenCode
on:
  issue_comment:
    types:
      - created
      - edited
  issues:
    types:
      - edited
      - opened
  pull_request_review:
    types:
      - submitted
  pull_request_review_comment:
    types:
      - created
      - edited
  workflow_call:
    inputs:
      agent:
        description: Agent to use.
        required: false
        type: string
      issue_number:
        description: Issue or PR number for workflow_call triggers
        required: false
        type: number
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        description: Agent to use.
        required: false
        type: string
      issue_number:
        description: Issue or PR number for manual workflow execution
        required: false
        type: number
      model:
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        type: string
jobs:
  opencode:
    permissions:
      actions: read
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    secrets: inherit  # pragma: allowlist secret
    uses: Cogni-AI-OU/.github/.github/workflows/opencode.yml@main
    with:
      agent: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.agent || '' }}
      issue_number: >-
        ${{ github.event.issue.number || github.event.pull_request.number || inputs.issue_number || '' }}
      model: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.model || '' }}
      prompt: >-
        ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
        && inputs.prompt || '' }}
